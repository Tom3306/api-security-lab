name: security-gates

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  security-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit semgrep

      - name: Bandit (fail on medium/high)
        run: |
          bandit -r app -f json -o bandit-report.json
          python - <<'PY'
          import json,sys
          data=json.load(open('bandit-report.json'))
          bad=[r for r in data.get('results',[]) if r.get('issue_severity') in ('MEDIUM','HIGH')]
          print(f"Bandit findings MEDIUM/HIGH: {len(bad)}")
          sys.exit(1 if bad else 0)
          PY

      - name: Semgrep (OWASP Top Ten)
        run: |
          semgrep --config p/owasp-top-ten app --error --json --output semgrep-report.json

      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            semgrep-report.json
